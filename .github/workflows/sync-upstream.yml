name: Sync Upstream

on:
  schedule:
    # Runs every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the synced commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync dibun75/ag-kit-custom -b main
